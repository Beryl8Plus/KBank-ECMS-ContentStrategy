services:
  svc-contstrat-delivery:
    build: .
    command: ["./svc-contstrat-delivery"]
    ports:
      - "8081:8082"
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
      SWAGGER_HOST: localhost:8082
      CMS_RUNTIME_GRPC_ADDR: svc-contstrat-runtime:50051
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      svc-contstrat-runtime:
        condition: service_started
    networks:
      - aks
      - cmc-backend

  redis:
    image: redis:latest
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - aks

  redisinsight:
    image: redis/redisinsight:latest
    container_name: redisinsight
    ports:
      - "5540:5540"
    environment:
      RI_ACCEPT_TERMS_AND_CONDITIONS: "true"
      RI_REDIS_HOST: redis
      RI_REDIS_PORT: 6379
      RI_REDIS_ALIAS: local-redis
      RI_REDIS_DB: 0
    volumes:
      - redisinsight:/data
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - aks

  svc-contstrat-backoffice:
    build: .
    command: ["sh", "-c", "./migrate && ./svc-contstrat-backoffice"]
    ports:
      - "8081:8081"
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
      SWAGGER_HOST: localhost:8081
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - cmc-backend
      - aks

  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: kbank_ecms
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - cmc-backend

volumes:
  redisinsight:

networks:
  aks:
    driver: bridge
  cmc-backend:
    driver: bridge