name: Commit message lint
on:
  pull_request:
  push:
jobs:
  commitlint:
    name: Commit message lint
    runs-on: ubuntu-latest
    env:
      GITHUB_EVENT_NAME: ${{ github.event_name }}
      GITHUB_SHA: ${{ github.sha }}
      PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
      PR_HEAD_REF: ${{ github.head_ref }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Make scripts executable
        run: chmod +x scripts/commit-lint.sh

      - name: Lint commit messages
        run: |
          set -euo pipefail
          git fetch --no-tags --prune --unshallow || true
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            git checkout "$PR_HEAD_REF"
            commits=$(git rev-list origin/"$PR_BASE_REF".."$PR_HEAD_REF" || true)
          else
            commits=$(git rev-list "$GITHUB_SHA" --max-count=50 || true)
          fi
          if [ -z "$commits" ]; then
            echo "No commits to lint."
            exit 0
          fi
          for c in $commits; do
            echo "Checking commit $c"
            git log --format=%B -n 1 "$c" > /tmp/commitmsg
            ./scripts/commit-lint.sh /tmp/commitmsg
          done
