name: Lint PR title
on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize
      - reopened
jobs:
  semantic-pull-request:
    name: Lint PR title
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          headerPattern: '^(\w+)(?:\(([a-zA-Z0-9._\/-]+)\))?: (.+)$'
          headerPatternCorrespondence: type,scope,subject
