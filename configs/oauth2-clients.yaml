# OAuth2 Client Credentials Configuration
# This file defines the clients that can obtain tokens using OAuth2 Client Credentials Flow
# Add new clients here without modifying the code

clients:
  - client_id: service-cmc
    client_secret: super-secret-key-cmc
    scopes:
      - read:rules
      - write:rules
    description: CMC service for service request from CMC System

