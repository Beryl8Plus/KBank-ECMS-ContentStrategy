newservice:
  name: "rule-management"
  log_level: "info"
  requestCacheTTL: 3
  outboundTTL: 3

server:
- name: "RULE_MANAGEMENT"
  placement: "rule-management"
  contentType: "RuleManagement"
  resource: "kasikornbank/getRuleManagement"
  endpoint: "https://example.invalid"
  servicebreaker: 5
  timeout: 5
  retries: 2
  ratelimit:
    requests_per_second: 50
    burst: 100
    max_concurrent_requests: 10
  transform:
    enabled: false
    rules: []
  response_mapping: []
  reponsedefault:
    enabled: false
    status_code: 200
    body: '{"message": "Service unavailable, using default"}'
  circuit_breaker:
    min_requests: 3
    failure_ratio: 0.6
    timeout_seconds: 5
