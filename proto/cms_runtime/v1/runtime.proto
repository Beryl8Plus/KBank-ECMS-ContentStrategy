syntax = "proto3";

package cms_runtime.v1;

option go_package = "kbank-ecms/internal/grpc/pb/cms_runtime/v1;cmsruntimev1";

// CMSRuntimeService exposes cms-runtime's rule evaluation engine over gRPC.
// cms-delivery calls this on a cache miss to trigger on-demand evaluation.
service CMSRuntimeService {
  // Evaluate returns cached logic entries when user attrs are empty.
  // With user attrs present, it resolves ranked results and keeps the
  // legacy rule.Score fallback when no variation matches.
  rpc Evaluate(EvaluateRequest) returns (EvaluateResponse);
}

// ---------------------------------------------------------------------------
// Request / Response
// ---------------------------------------------------------------------------

// EvaluateRequest carries all data needed for evaluation.
// The caller (cms-delivery) is responsible for querying the database.
message EvaluateRequest {
  // Placement name being evaluated, e.g. "hero" or "banner_top".
  string placement_name = 1;

  // JSON-serialised []entity.Schedule with preloaded DecisionRule,
  // Placement, RuleConditions (+ Attribute), and Rules (+ RuleAttributes).
  // JSON bytes avoid duplicating the complex entity graph in proto.
  bytes schedules_json = 2;

  // Native key-value pairs for user attributes (attributeID → compact JSON
  // value). This replaces the previous bytes user_attrs_json field to
  // eliminate JSON marshalling overhead on the gRPC wire path.
  // An empty map means return logic entries for delivery-time evaluation.
  map<string, bytes> user_attrs = 4;

  // Deprecated: use user_attrs map instead. Kept temporarily for backward
  // compatibility during rollout.
  bytes user_attrs_json = 3;
}

// EvaluateResponse carries evaluated ContentResult entries using the existing
// proto ContentResult message. This replaces the previous bytes
// logic_entries_json field to eliminate JSON marshalling overhead.
message EvaluateResponse {
  // Native repeated ContentResult entries.
  repeated ContentResult results = 2;

  // Deprecated: use results repeated field instead.
  bytes logic_entries_json = 1;
}

// ---------------------------------------------------------------------------
// Shared messages
// ---------------------------------------------------------------------------

// Campaign carries campaign metadata for AUDIENCE / SALES_TARGET rule types.
message Campaign {
  string code       = 1;
  string start_date = 2;
  string end_date   = 3;
}

// LogicCondition is a flattened, self-contained representation of a single
// rule condition. It carries everything needed to evaluate the condition
// against live user attributes without a DB hit.
message LogicCondition {
  string condition_id        = 1;
  string parent_condition_id = 2;
  string attribute_id        = 3;
  string data_type           = 4;
  string logical_operator    = 5;
  string connector_operator  = 6;
  int32  sequence            = 7;
  bytes  expected_value      = 8; // compact JSON from RuleAttribute.Value
}

// ContentResult is a single evaluated and ranked content item.
message ContentResult {
  string            content_path     = 1;
  string            decision_rule_id = 2;
  string            rule_set_type    = 3;
  string            source           = 4;
  double            score            = 5;
  optional string   variation        = 6;
  string            start_date_time  = 7;
  string            end_date_time    = 8;
  optional Campaign campaign         = 9;
  string            logic_hash       = 10;
  string            logic_expr       = 11;
  bool              logic_eval       = 12;
  repeated LogicCondition conditions = 13;
}
